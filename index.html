<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple SNS</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-16">

  <!-- ========================================== -->
  <!-- 1. ログイン / 新規登録 ページ -->
  <!-- ========================================== -->
  <div id="page-auth" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-md">
    <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center">ログイン</h2>
    <form id="auth-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium">メールアドレス</label>
        <input type="email" id="auth-email" required class="w-full p-2 border rounded-md">
      </div>
      <div>
        <label class="block text-sm font-medium">パスワード</label>
        <input type="password" id="auth-password" required class="w-full p-2 border rounded-md" minlength="6">
      </div>
      <button type="submit" id="auth-submit" class="w-full bg-blue-500 text-white p-2 rounded-md font-bold hover:bg-blue-600">ログイン</button>
    </form>
    <div class="mt-4 text-center">
      <button id="auth-toggle" class="text-sm text-blue-500 hover:underline">新規登録はこちら</button>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- アプリのメインコンテンツ（ログイン後表示） -->
  <!-- ========================================== -->
  <div id="app-main" class="hidden">
    <!-- ヘッダーナビゲーション -->
    <header class="bg-white shadow-sm p-4 sticky top-0 flex justify-between items-center z-10">
      <h1 class="text-xl font-bold text-blue-500 cursor-pointer" onclick="switchPage('home')">SimpleSNS</h1>
      <div class="space-x-4">
        <button onclick="switchPage('home')" class="hover:text-blue-500 font-medium">🏠 ホーム/検索</button>
        <button onclick="switchPage('post')" class="hover:text-blue-500 font-medium">📝 投稿</button>
        <button onclick="switchPage('profile')" class="hover:text-blue-500 font-medium">👤 プロフィール</button>
      </div>
    </header>

    <!-- 2. ホーム ＆ 検索ページ -->
    <div id="page-home" class="max-w-xl mx-auto p-4 space-y-4 page-content">
      <!-- 検索バー -->
      <div class="bg-white p-3 rounded-lg shadow-sm flex gap-2">
        <input type="text" id="search-input" placeholder="投稿内容やユーザー名で検索..." class="w-full p-2 border rounded-md">
        <button onclick="fetchTimeline()" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600">検索</button>
      </div>
      <!-- タイムライン -->
      <div id="timeline" class="space-y-3">
        <!-- ここに投稿が動的に挿入されます -->
      </div>
    </div>

    <!-- 3. 投稿ページ -->
    <div id="page-post" class="max-w-xl mx-auto p-4 page-content hidden">
      <div class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-xl font-bold mb-4">いまどうしてる？</h2>
        <form id="post-form" class="space-y-4">
          <textarea id="post-content" rows="4" placeholder="ここにメッセージを入力..." required class="w-full p-2 border rounded-md"></textarea>
          <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded-md font-bold hover:bg-blue-600 block ml-auto">投稿する</button>
        </form>
      </div>
    </div>

    <!-- 4. プロフィールページ -->
    <div id="page-profile" class="max-w-xl mx-auto p-4 page-content hidden">
      <div class="bg-white p-6 rounded-lg shadow-md text-center">
        <div class="w-24 h-24 bg-gray-300 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl">👤</div>
        <h2 id="profile-email" class="text-xl font-bold mb-2">---</h2>
        <p id="profile-id" class="text-gray-500 text-sm mb-6">ID: ------</p>
        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-md font-bold hover:bg-red-600">ログアウト</button>
      </div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- 5. 画面制御 ＆ API連携ロジック -->
  <!-- ========================================== -->
  <script>
    const API_BASE = 'http://localhost:3000/api';
    let isSignUpMode = false;
    let userSession = null; 

    // ページ切り替え処理
    function switchPage(pageId) {
      document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
      document.getElementById(`page-${pageId}`).classList.remove('hidden');
      
      if (pageId === 'home') {
        document.getElementById('search-input').value = ''; // 検索をクリアして再取得
        fetchTimeline();
      }
      if (pageId === 'profile') {
        loadProfile();
      }
    }

    // ログイン ⇆ 新規登録 モード切り替え
    document.getElementById('auth-toggle').addEventListener('click', () => {
      isSignUpMode = !isSignUpMode;
      document.getElementById('auth-title').innerText = isSignUpMode ? '新規登録' : 'ログイン';
      document.getElementById('auth-submit').innerText = isSignUpMode ? '登録する' : 'ログイン';
      document.getElementById('auth-toggle').innerText = isSignUpMode ? 'ログインはこちら' : '新規登録はこちら';
    });

    // 認証（サインアップ・サインイン）処理の実行
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      
      const endpoint = isSignUpMode ? `${API_BASE}/auth/signup` : `${API_BASE}/auth/login`;

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || '認証に失敗しました。');
        }

        if (isSignUpMode) {
          alert('登録が完了しました！確認メールが届いている場合は認証リンクをクリックしてからログインしてください。');
          isSignUpMode = false;
          document.getElementById('auth-toggle').click(); // ログイン画面に戻す
          return;
        }

        // ログイン成功時：セッション情報（JWTトークン含む）を保存
        userSession = data.session;

        if (!userSession) {
          throw new Error('セッションの取得に失敗しました。メール認証が完了しているか確認してください。');
        }

        // 画面の表示切り替え
        document.getElementById('page-auth').classList.add('hidden');
        document.getElementById('app-main').classList.remove('hidden');
        switchPage('home');

      } catch (err) {
        alert(`エラー: ${err.message}`);
      }
    });

    // タイムラインの取得（検索フィルタ付き）
    async function fetchTimeline() {
      const searchWord = document.getElementById('search-input').value.toLowerCase();
      const timelineEl = document.getElementById('timeline');
      timelineEl.innerHTML = '<p class="text-center text-gray-500">タイムラインを読み込み中...</p>';

      try {
        const res = await fetch(`${API_BASE}/posts`);
        let posts = await res.json();

        if (!res.ok) throw new Error(posts.error || '投稿の取得に失敗しました。');

        // 検索ワードがある場合はフロント側でフィルタリング
        if (searchWord) {
          posts = posts.filter(post => 
            post.content.toLowerCase().includes(searchWord) || 
            post.username.toLowerCase().includes(searchWord)
          );
        }

        if (posts.length === 0) {
          timelineEl.innerHTML = '<p class="text-center text-gray-500 p-4 bg-white rounded-lg">表示できる投稿がありません。</p>';
          return;
        }

        timelineEl.innerHTML = posts.map(post => `
          <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-2">
              <span class="font-bold text-blue-600">@${post.username}</span>
              <span class="text-xs text-gray-400">${new Date(post.created_at).toLocaleString()}</span>
            </div>
            <p class="text-gray-700 whitespace-pre-wrap">${post.content}</p>
          </div>
        `).join('');

      } catch (err) {
        timelineEl.innerHTML = `<p class="text-center text-red-500 p-4 bg-white rounded-lg">エラー: ${err.message}</p>`;
      }
    }

    // 投稿処理の実行
    document.getElementById('post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = document.getElementById('post-content').value;

      try {
        const res = await fetch(`${API_BASE}/posts`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${userSession?.access_token}` // ヘッダーにトークンを添付
          },
          body: JSON.stringify({ content })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || '投稿に失敗しました。');
        }

        document.getElementById('post-content').value = '';
        alert('投稿が完了しました！');
        switchPage('home');

      } catch (err) {
        alert(`エラー: ${err.message}`);
      }
    });

    // プロフィール情報のマッピング
    function loadProfile() {
      if (userSession && userSession.user) {
        document.getElementById('profile-email').innerText = userSession.user.email;
        document.getElementById('profile-id').innerText = `ID: ${userSession.user.id}`;
      }
    }

    // ログアウト処理
    function logout() {
      userSession = null;
      document.getElementById('app-main').classList.add('hidden');
      document.getElementById('page-auth').classList.remove('hidden');
      document.getElementById('auth-form').reset();
      alert('ログアウトしました。');
    }
  </script>
</body>
</html>
